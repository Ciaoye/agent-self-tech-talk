<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" width="1024" height="768" role="img" aria-labelledby="title desc">
  <title id="title">ciao —— 我的数字分身</title>
  <desc id="desc">人格层 + 知识检索层 + 记忆层 + 对话界面，四层架构组成数字分身</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .title { font-size: 28px; font-weight: 760; }
      .claim { font-size: 15px; fill: #596362; }
      .layer-title { font-size: 20px; font-weight: 760; }
      .section-title { font-size: 17px; font-weight: 760; }
      .body { font-size: 13.5px; fill: #3f4e4c; }
      .small { font-size: 12.5px; fill: #596362; }
      .green { fill: #ddf7ef; stroke: #10a98c; stroke-width: 1.4; }
      .blue { fill: #e6f2ff; stroke: #4f8fd6; stroke-width: 1.4; }
      .purple { fill: #f0e8ff; stroke: #8b6fd6; stroke-width: 1.4; }
      .white { fill: #ffffff; stroke: #d5d1c7; stroke-width: 1.1; }
      .white-green { fill: #ffffff; stroke: #10a98c; stroke-width: 1.1; }
      .white-blue { fill: #ffffff; stroke: #4f8fd6; stroke-width: 1.1; }
      .neutral-box { fill: #f1efe7; stroke: #d5d1c7; stroke-width: 1.1; }
      .green-text { fill: #006b61; }
      .blue-text { fill: #1b4d7a; }
      .purple-text { fill: #4b2e83; }
      .line { stroke: #74736c; stroke-width: 2; fill: none; stroke-linecap: round; }
      .dashed { stroke: #74736c; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; }
      .divider { stroke: #d5d1c7; stroke-width: 1; fill: none; }
    </style>
    <marker id="arrow-up" markerWidth="8" markerHeight="8" refX="4" refY="1" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 8 L 4 0 L 8 8 Z" fill="#74736c"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="512" y="38" text-anchor="middle" class="title">ciao —— 我的数字分身</text>
  <text x="512" y="62" text-anchor="middle" class="claim">人格层 → 知识检索层 → 记忆层 → 对话界面 · 四层架构</text>

  <!-- ===== TOP LAYER: 对话界面 ===== -->
  <rect x="150" y="80" width="724" height="160" rx="8" class="green"/>
  <text x="512" y="108" text-anchor="middle" class="layer-title green-text">对话界面</text>
  <text x="512" y="128" text-anchor="middle" class="small">对外呈现的统一入口，用户感知到的"数字分身"的完整人格</text>

  <rect x="170" y="142" width="220" height="85" rx="6" class="white-green"/>
  <text x="180" y="164" class="section-title green-text">按俏也的方式思考</text>
  <text x="180" y="184" class="small">基于 core + worldview</text>
  <text x="180" y="202" class="small">生成一致性的回应</text>
  <text x="180" y="220" class="small">保持人格稳态</text>

  <rect x="402" y="142" width="220" height="85" rx="6" class="white-green"/>
  <text x="412" y="164" class="section-title green-text">引用真实经历</text>
  <text x="412" y="184" class="small">通过 knowledge 检索</text>
  <text x="412" y="202" class="small">准确引用过往事件</text>
  <text x="412" y="220" class="small">建立真实可信感</text>

  <rect x="634" y="142" width="220" height="85" rx="6" class="white-green"/>
  <text x="644" y="164" class="section-title green-text">文风恰当</text>
  <text x="644" y="184" class="small">匹配上下文语境</text>
  <text x="644" y="202" class="small">自然流畅的表达</text>
  <text x="644" y="220" class="small">个性化语言风格</text>

  <!-- Arrow top → middle -->
  <line x1="512" y1="244" x2="512" y2="266" class="line"/>

  <!-- ===== MIDDLE LAYER: 知识检索 + 记忆 ===== -->
  <rect x="80" y="270" width="864" height="200" rx="8" class="blue"/>

  <!-- 知识检索层 -->
  <rect x="100" y="280" width="824" height="86" rx="6" class="white-blue"/>
  <text x="118" y="304" class="section-title blue-text">知识检索层 (knowledge/)</text>
  <text x="118" y="324" class="small">向量化语义索引，对话时按需检索最相关的生活片段</text>

  <rect x="118" y="336" width="200" height="24" rx="4" class="blue"/>
  <text x="218" y="353" text-anchor="middle" class="small blue-text">wiki-public (184篇)</text>
  <rect x="330" y="336" width="120" height="24" rx="4" class="blue"/>
  <text x="390" y="353" text-anchor="middle" class="small blue-text">编年史</text>
  <rect x="462" y="336" width="120" height="24" rx="4" class="blue"/>
  <text x="522" y="353" text-anchor="middle" class="small blue-text">搜索源</text>
  <rect x="594" y="336" width="310" height="24" rx="4" class="blue"/>
  <text x="749" y="353" text-anchor="middle" class="small blue-text">结构化索引 · 实时检索</text>

  <!-- 记忆层 -->
  <rect x="100" y="374" width="824" height="86" rx="6" fill="#ffffff" stroke="#8b6fd6" stroke-width="1.1"/>
  <text x="118" y="398" class="section-title purple-text">记忆层 (memory/)</text>
  <text x="118" y="418" class="small">维护多轮对话的连续性，决定记录什么、如何记录</text>

  <rect x="118" y="430" width="260" height="24" rx="4" class="purple"/>
  <text x="248" y="447" text-anchor="middle" class="small purple-text">短期上下文窗口</text>
  <rect x="394" y="430" width="260" height="24" rx="4" class="purple"/>
  <text x="524" y="447" text-anchor="middle" class="small purple-text">长期对话摘要</text>
  <rect x="670" y="430" width="234" height="24" rx="4" class="purple"/>
  <text x="787" y="447" text-anchor="middle" class="small purple-text">关键信息持久化</text>

  <!-- Arrows showing data flow (right side) -->
  <line x1="920" y1="320" x2="920" y2="260" class="dashed" marker-end="url(#arrow-up)"/>
  <text x="940" y="292" class="small">检索</text>
  <line x1="920" y1="460" x2="920" y2="380" class="dashed" marker-end="url(#arrow-up)"/>
  <text x="940" y="422" class="small">注入</text>

  <!-- Arrow middle → bottom -->
  <line x1="512" y1="474" x2="512" y2="496" class="line"/>

  <!-- ===== BOTTOM LAYER: 人格层 ===== -->
  <rect x="40" y="500" width="944" height="240" rx="8" class="green"/>
  <text x="512" y="528" text-anchor="middle" class="layer-title">人格层 (core + worldview · 7+11 文件)</text>

  <!-- core/ section -->
  <rect x="60" y="544" width="440" height="180" rx="6" class="white"/>
  <text x="78" y="568" class="section-title">core /</text>

  <rect x="78" y="580" width="188" height="32" rx="4" class="neutral-box"/>
  <text x="172" y="602" text-anchor="middle" class="body">system-prompt</text>
  <rect x="276" y="580" width="100" height="32" rx="4" class="neutral-box"/>
  <text x="326" y="602" text-anchor="middle" class="body">voice</text>
  <rect x="386" y="580" width="96" height="32" rx="4" class="neutral-box"/>
  <text x="434" y="602" text-anchor="middle" class="body">thinking</text>

  <rect x="78" y="622" width="128" height="32" rx="4" class="neutral-box"/>
  <text x="142" y="644" text-anchor="middle" class="body">soul</text>
  <rect x="216" y="622" width="160" height="32" rx="4" class="neutral-box"/>
  <text x="296" y="644" text-anchor="middle" class="body">boundaries</text>

  <text x="78" y="688" class="small">定义人格核心：思考方式、语气、边界</text>
  <text x="78" y="708" class="small">内在价值观与行为约束</text>

  <!-- worldview/ section -->
  <rect x="520" y="544" width="444" height="180" rx="6" class="white"/>
  <text x="538" y="568" class="section-title">worldview /</text>

  <rect x="538" y="580" width="210" height="32" rx="4" class="neutral-box"/>
  <text x="643" y="602" text-anchor="middle" class="body">身体与感受</text>
  <rect x="758" y="580" width="190" height="32" rx="4" class="neutral-box"/>
  <text x="853" y="602" text-anchor="middle" class="body">金钱与交换</text>

  <rect x="538" y="622" width="190" height="32" rx="4" class="neutral-box"/>
  <text x="633" y="644" text-anchor="middle" class="body">活的神话机器</text>
  <rect x="738" y="622" width="210" height="32" rx="4" class="neutral-box"/>
  <text x="843" y="644" text-anchor="middle" class="body">关系与社群</text>

  <text x="538" y="688" class="small">世界观模型：11 个维度定义如何</text>
  <text x="538" y="708" class="small">理解世界、行动与决策</text>
</svg>
