<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768">
  <defs>
    <marker id="arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#74736c"/>
    </marker>
    <marker id="arrow-d" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 3 8, 6 0" fill="#74736c"/>
    </marker>
  </defs>
  <rect width="1024" height="768" fill="transparent"/>

  <!-- Title area -->
  <text x="512" y="36" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#18343a">Karpathy LLM Wiki — 三层架构 + 三个操作</text>

  <!-- LEFT SIDE: 三层架构 -->
  <rect x="30" y="60" width="460" height="660" rx="10" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.5"/>
  <text x="260" y="92" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#18343a">三层架构</text>

  <!-- Layer 3: Schema (top, narrow) -->
  <rect x="110" y="110" width="300" height="100" rx="8" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.5"/>
  <text x="260" y="140" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#4b2e83">Schema（模式定义）</text>
  <text x="260" y="162" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4b2e83">CLAUDE.md — 结构约定、工作流</text>
  <text x="260" y="182" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4b2e83">让 LLM 成为有纪律的维护者</text>
  <text x="260" y="202" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#8b6fd6">人类和 LLM 一起迭代</text>

  <!-- Arrow 2→3 -->
  <line x1="260" y1="215" x2="260" y2="230" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-d)"/>

  <!-- Layer 2: Wiki (middle) -->
  <rect x="70" y="232" width="380" height="120" rx="8" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.5"/>
  <text x="260" y="264" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#1b4d7a">Wiki（知识层）</text>
  <text x="260" y="288" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#1b4d7a">LLM 生成的 Markdown 目录</text>
  <text x="260" y="308" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#1b4d7a">摘要 · 实体页 · 概念页 · 对比分析 · 综合判断</text>
  <text x="260" y="328" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#1b4d7a">交叉引用已建好 · 矛盾已标注 · 复合增长</text>
  <text x="260" y="345" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#4f8fd6">完全由 LLM 拥有</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="355" x2="260" y2="370" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-d)"/>

  <!-- Layer 1: Raw Sources (bottom, widest) -->
  <rect x="50" y="372" width="420" height="100" rx="8" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.5"/>
  <text x="260" y="404" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#006b61">Raw Sources（原始资料源）</text>
  <text x="260" y="428" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#006b61">文章 · 论文 · 图片 · 数据文件</text>
  <text x="260" y="448" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#006b61">只读封存 · 权威来源 · 永远保持原样</text>
  <text x="260" y="465" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#10a98c">人类筛选资料源</text>

  <!-- Role labels on left -->
  <text x="40" y="250" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#8b6fd6">👤 人类</text>
  <text x="40" y="270" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#8b6fd6">定义规则</text>
  <text x="40" y="430" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#10a98c">👤 人类</text>
  <text x="40" y="450" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#10a98c">筛选资料</text>
  <text x="380" y="300" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#4f8fd6" text-anchor="end">🤖 LLM 维护</text>

  <!-- RIGHT SIDE: 三个操作 -->
  <rect x="520" y="60" width="474" height="660" rx="10" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.5"/>
  <text x="757" y="92" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#18343a">三个操作</text>

  <!-- Ingest -->
  <rect x="545" y="112" width="424" height="130" rx="8" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.5"/>
  <text x="757" y="142" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#1b4d7a">1. Ingest（摄入）</text>
  <text x="757" y="168" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#1b4d7a">新资料 → LLM 阅读 → 讨论关键点</text>
  <text x="757" y="188" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#1b4d7a">写摘要页 → 更新索引 → 更新实体/概念页</text>
  <text x="757" y="208" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#1b4d7a">追加日志。一篇源文件同时触及 10-15 个页面</text>
  <text x="757" y="232" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#4f8fd6">逐条/批量摄入，全程参与或减少监督</text>

  <!-- Arrow -->
  <line x1="757" y1="247" x2="757" y2="265" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-d)"/>

  <!-- Query -->
  <rect x="545" y="268" width="424" height="130" rx="8" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.5"/>
  <text x="757" y="298" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#4b2e83">2. Query（查询）</text>
  <text x="757" y="324" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4b2e83">对 wiki 提问 → 搜索相关页 → 综合答案</text>
  <text x="757" y="344" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4b2e83">输出：Markdown/表格/幻灯/图表</text>
  <text x="757" y="368" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4b2e83">★ 好的答案作为新页面归档回 wiki</text>
  <text x="757" y="392" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#8b6fd6">探索成果不消失，在知识库中复利增长</text>

  <!-- Arrow -->
  <line x1="757" y1="403" x2="757" y2="421" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-d)"/>

  <!-- Lint -->
  <rect x="545" y="424" width="424" height="130" rx="8" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.5"/>
  <text x="757" y="454" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#006b61">3. Lint（检查）</text>
  <text x="757" y="480" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#006b61">定期健康检查：页面矛盾？过时断言？</text>
  <text x="757" y="500" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#006b61">孤儿页面？缺失交叉引用？数据缺口？</text>
  <text x="757" y="520" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#006b61">LLM 擅长建议新调查问题和资料来源</text>
  <text x="757" y="544" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#10a98c">让 wiki 在增长中保持健康</text>

  <!-- Bottom: two special files -->
  <rect x="545" y="570" width="424" height="70" rx="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.5"/>
  <text x="757" y="596" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#7a3f00">两个特殊文件：index.md + log.md</text>
  <text x="757" y="618" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#7a3f00">index.md 面向内容（目录）· log.md 面向时间线（只追加）</text>

  <!-- Bottom summary -->
  <text x="512" y="740" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="14" fill="#18343a" font-style="italic">Obsidian = IDE &nbsp;·&nbsp; LLM = 程序员 &nbsp;·&nbsp; Wiki = 代码库</text>
</svg>
