<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768">
  <defs>
    
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
    </style>
  <marker id="arrow-up" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#74736c"/>
    </marker>
    <marker id="arrow-warn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f1a23a"/>
    </marker>
  </defs>

  <rect width="1024" height="768" fill="transparent"/>

  <!-- ===== 阻碍层（左侧虚线框标注） ===== -->
  <rect x="40" y="100" width="150" height="530" rx="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="115" y="138" text-anchor="middle" font-size="20" font-weight="700" fill="#7a3f00">阻碍</text>

  <!-- 阻碍项 -->
  <rect x="62" y="168" width="106" height="36" rx="6" fill="#ffe0b0" stroke="#f1a23a" stroke-width="1.2"/>
  <text x="115" y="192" text-anchor="middle" font-size="17" fill="#7a3f00">习性</text>

  <rect x="62" y="224" width="106" height="36" rx="6" fill="#ffe0b0" stroke="#f1a23a" stroke-width="1.2"/>
  <text x="115" y="248" text-anchor="middle" font-size="17" fill="#7a3f00">标签化</text>

  <rect x="62" y="280" width="106" height="54" rx="6" fill="#ffe0b0" stroke="#f1a23a" stroke-width="1.2"/>
  <text x="115" y="304" text-anchor="middle" font-size="13.5" fill="#7a3f00">自动驾驶式</text>
  <text x="115" y="322" text-anchor="middle" font-size="13.5" fill="#7a3f00">默认判断</text>

  <!-- 阻碍到各层的虚线箭头 -->
  <line x1="190" y1="186" x2="245" y2="186" stroke="#f1a23a" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-warn)"/>
  <line x1="190" y1="242" x2="275" y2="242" stroke="#f1a23a" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-warn)"/>
  <line x1="190" y1="307" x2="305" y2="307" stroke="#f1a23a" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-warn)"/>

  <!-- ===== 底层：经验档案库 ===== -->
  <rect x="270" y="530" width="650" height="100" rx="12" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="2"/>
  <text x="595" y="568" text-anchor="middle" font-size="20" font-weight="700" fill="#1b4d7a">经验档案库</text>
  <text x="595" y="598" text-anchor="middle" font-size="13.5" fill="#1b4d7a">内在储存的一切</text>

  <!-- 底→中箭头 -->
  <line x1="595" y1="530" x2="595" y2="465" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-up)"/>

  <!-- ===== 中层：三观操作系统 ===== -->
  <rect x="310" y="345" width="570" height="120" rx="12" fill="#f1efe7" stroke="#d5d1c7" stroke-width="2"/>
  <text x="595" y="383" text-anchor="middle" font-size="20" font-weight="700" fill="#18343a">三观操作系统</text>
  <text x="595" y="412" text-anchor="middle" font-size="15" fill="#18343a">如是观 · 因果观 · 世界观</text>
  <text x="595" y="438" text-anchor="middle" font-size="13" fill="#5a5a55">去标签地观察生活</text>

  <!-- 中→顶箭头 -->
  <line x1="595" y1="345" x2="595" y2="285" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-up)"/>

  <!-- ===== 顶层：智慧 × 形式 = 创作 ===== -->
  <rect x="370" y="115" width="450" height="170" rx="14" fill="#ddf7ef" stroke="#10a98c" stroke-width="2.5"/>
  <text x="595" y="165" text-anchor="middle" font-size="22" font-weight="760" fill="#006b61">智慧 × 形式 = 创作</text>
  <rect x="410" y="185" width="370" height="1" fill="#10a98c" opacity="0.3"/>
  <text x="595" y="215" text-anchor="middle" font-size="13.5" fill="#006b61">最底层的智慧</text>
  <text x="595" y="240" text-anchor="middle" font-size="13.5" fill="#006b61">找到最合适的形式</text>

  <!-- 底线标注 -->
  <text x="595" y="670" text-anchor="middle" font-size="13" fill="#596362">赖声川创作金字塔</text>
</svg>