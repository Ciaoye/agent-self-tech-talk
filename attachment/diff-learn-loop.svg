<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" width="1024" height="768" role="img">
  <title>diff-learn 闭环：从单篇经验到可复用标准</title>
  <desc>每一篇写完后，对比 AI draft 和俏也 final，提炼规律，回写 standards</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }

    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#74736c"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f8fd6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10a98c"/>
    </marker>
  </defs>

  
  <text x="28" y="34" font-size="28" font-weight="760" fill="#18343a">每篇写完后，经验如何沉淀为标准</text>
  <text x="28" y="56" font-size="15" fill="#596362">版本文件头记录决策链 → diff 对比 → 提炼规律 → 回写 standards → 下次写作自动继承</text>

  
  <rect x="28" y="76" width="216" height="60" rx="10" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.4"/>
  <text x="136" y="102" font-size="16" font-weight="700" fill="#7a3f00" text-anchor="middle">俏也写 Final</text>
  <text x="136" y="122" font-size="12" fill="#c28530" text-anchor="middle">final-{slug}.md</text>

  
  <line x1="244" y1="106" x2="296" y2="106" stroke="#74736c" stroke-width="1.4" marker-end="url(#arr)"/>

  
  <rect x="300" y="76" width="696" height="140" rx="10" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.4"/>

  <text x="320" y="102" font-size="15" font-weight="700" fill="#1b4d7a">Step 0：回看决策链</text>
  <text x="320" y="122" font-size="13" fill="#4f8fd6">读每个版本的文件头 — 串起整条决策日志</text>

  <line x1="320" y1="132" x2="976" y2="132" stroke="rgba(79,143,214,.15)" stroke-width="0.5"/>

  <text x="320" y="152" font-size="13" fill="#18343a">每个 draft/final 文件头部累积记录：语料库批注 → 写作架构批注 → v1批注 → v2批注 → 本版策略</text>
  <text x="320" y="172" font-size="13" fill="#18343a">回答：俏也每一轮给了什么反馈？AI 怎么响应？哪些问题反复出现？搜得够不够？</text>

  
  <rect x="320" y="186" width="210" height="24" rx="5" fill="rgba(79,143,214,.10)" stroke="rgba(79,143,214,.18)" stroke-width="0.5"/>
  <text x="425" y="202" font-size="12" fill="#1b4d7a" text-anchor="middle">俏也原话保留，不转述</text>

  <rect x="540" y="186" width="210" height="24" rx="5" fill="rgba(79,143,214,.10)" stroke="rgba(79,143,214,.18)" stroke-width="0.5"/>
  <text x="645" y="202" font-size="12" fill="#1b4d7a" text-anchor="middle">"本版策略"记录 AI 如何理解反馈</text>

  
  <line x1="648" y1="216" x2="648" y2="248" stroke="#74736c" stroke-width="1.4" marker-end="url(#arr)"/>

  
  <rect x="436" y="252" width="424" height="62" rx="10" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.4"/>

  <text x="648" y="276" font-size="15" font-weight="700" fill="#006b61" text-anchor="middle">Step 1–2：通篇 Flow + 段落级 Diff</text>
  <text x="648" y="298" font-size="13" fill="#2eab8a" text-anchor="middle">删 / 加 / 改 / 保留  —  生成 diff-analysis-{slug}.md</text>

  
  <line x1="648" y1="314" x2="648" y2="346" stroke="#74736c" stroke-width="1.4" marker-end="url(#arr)"/>

  
  <rect x="312" y="350" width="672" height="120" rx="10" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.4"/>

  <text x="332" y="376" font-size="15" font-weight="700" fill="#4b2e83">Step 3：提炼规律 → 回写 Standards</text>
  <text x="332" y="396" font-size="13" fill="#9b85d4">不是把所有发现都写成规则 — 先问「这是规律还是这篇的选择？」</text>

  <line x1="332" y1="406" x2="964" y2="406" stroke="rgba(139,111,214,.15)" stroke-width="0.5"/>

  
  <rect x="332" y="416" width="200" height="44" rx="6" fill="rgba(139,111,214,.10)" stroke="rgba(139,111,214,.18)" stroke-width="0.5"/>
  <text x="432" y="434" font-size="13" font-weight="600" fill="#4b2e83" text-anchor="middle">检验标准</text>
  <text x="432" y="452" font-size="11" fill="#9b85d4" text-anchor="middle">两篇 final 里同一模式 = 规律</text>

  
  <rect x="548" y="416" width="190" height="44" rx="6" fill="rgba(139,111,214,.10)" stroke="rgba(139,111,214,.18)" stroke-width="0.5"/>
  <text x="643" y="434" font-size="13" font-weight="600" fill="#4b2e83" text-anchor="middle">规则反例</text>
  <text x="643" y="452" font-size="11" fill="#9b85d4" text-anchor="middle">一篇的写法 ≠ 通用规则</text>

  
  <rect x="754" y="416" width="210" height="44" rx="6" fill="rgba(139,111,214,.10)" stroke="rgba(139,111,214,.18)" stroke-width="0.5"/>
  <text x="859" y="434" font-size="13" font-weight="600" fill="#4b2e83" text-anchor="middle">总量克制</text>
  <text x="859" y="452" font-size="11" fill="#9b85d4" text-anchor="middle">每次 3-5 条可回写规则</text>

  
  <line x1="648" y1="470" x2="648" y2="502" stroke="#74736c" stroke-width="1.4" marker-end="url(#arr)"/>

  
  <rect x="436" y="506" width="424" height="52" rx="10" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.4"/>

  <text x="648" y="528" font-size="15" font-weight="700" fill="#18343a" text-anchor="middle">俏也确认 → 融入 standards/ 正文</text>
  <text x="648" y="548" font-size="13" fill="#596362" text-anchor="middle">1-思维方式.md · 2-文章结构.md · 3-文风指南.md · CLAUDE.md</text>

  
  <line x1="648" y1="558" x2="648" y2="590" stroke="#10a98c" stroke-width="2" marker-end="url(#arr-green)"/>

  
  <rect x="348" y="594" width="600" height="66" rx="10" fill="#ddf7ef" stroke="#10a98c" stroke-width="2"/>

  <text x="648" y="618" font-size="16" font-weight="700" fill="#006b61" text-anchor="middle">下一次写作自动继承</text>
  <text x="648" y="638" font-size="13" fill="#2eab8a" text-anchor="middle">Stage 1 备菜时加载 standards → AI 用上次的经验写这次 → 不用每次重新纠正</text>
  <text x="648" y="654" font-size="12" fill="#2eab8a" text-anchor="middle">standards 随每篇终稿拉锯战生长，是 pipeline 的核心差异化环节</text>

  
  <line x1="860" y1="506" x2="960" y2="506" stroke="rgba(16,169,140,.20)" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="960" y1="506" x2="960" y2="106" stroke="rgba(16,169,140,.20)" stroke-width="1" stroke-dasharray="6,3"/>
  <polygon points="960,200 953,212 967,212" fill="rgba(16,169,140,.30)"/>

  <rect x="928" y="120" width="64" height="72" rx="6" fill="rgba(16,169,140,.08)" stroke="rgba(16,169,140,.15)" stroke-width="1"/>
  <text x="960" y="142" font-size="12" font-weight="600" fill="#006b61" text-anchor="middle">闭环</text>
  <text x="960" y="160" font-size="11" fill="#2eab8a" text-anchor="middle">下次自动</text>
  <text x="960" y="176" font-size="11" fill="#2eab8a" text-anchor="middle">加载</text>

</svg>