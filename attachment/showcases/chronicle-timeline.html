<style>
  :root {

  body {
    font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(251,248,244,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 16px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -0.3px; }
  header .sub { font-size: 13px; color: var(--muted); }
  .nav-home {
    margin-left: auto; font-size: 12px; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px;
  }
  .nav-home:hover { color: var(--text); border-color: var(--muted); }

  .layout { display: flex; margin-top: 64px; }
  .sidebar {
    position: fixed; top: 64px; left: 0; width: var(--nav-width); bottom: 0;
    overflow-y: auto; padding: 20px 12px;
    border-right: 1px solid var(--line);
    background: var(--bg);
  }
  .sidebar a {
    display: block; padding: 6px 10px; font-size: 13px; color: var(--muted);
    text-decoration: none; border-radius: 6px; margin-bottom: 2px;
    transition: all 0.15s;
  }
  .sidebar a:hover { background: var(--line); color: var(--text); }
  .sidebar a.active { background: var(--text); color: #FFF8F1; font-weight: 500; }
  .sidebar .stage-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }

  .main { margin-left: var(--nav-width); flex: 1; padding: 28px 40px 80px; max-width: 900px; }
  .year-section { margin-bottom: 48px; }
  .year-header {
    position: sticky; top: 64px; z-index: 10;
    background: var(--bg); padding: 12px 0 8px;
    border-bottom: 1px solid var(--line); margin-bottom: 16px;
  }
  .year-header h2 { font-size: 22px; font-weight: 500; }
  .year-header .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .year-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    color: #FFF; font-weight: 500; margin-right: 6px;
  }

  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .event-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; font-size: 13px; line-height: 1.5;
  }
  .event-card .month-badge {
    font-size: 10px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .event-card .loc {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .event-card .loc::before { content: '📍 '; }

  .mini-chart { margin-bottom: 32px; height: 60px; }
  .legend-bar {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
    font-size: 11px; color: var(--muted);
  }
  .legend-bar span { display: flex; align-items: center; gap: 4px; }
  .legend-bar .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 20px 16px 60px; }
    header { padding: 12px 16px; }
    .events-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

const years = Object.keys(data).sort();

function buildSidebar(){
  const nav = document.getElementById('sidebar');
  years.forEach(y => {
    const a = document.createElement('a');
    a.href = '#y'+y;
    a.innerHTML = '<span class="stage-dot" style="background:'+stageColors[y]+';flex-shrink:0;"></span>'+y;
    nav.appendChild(a);
  });
}

function buildContent(){
  const c = document.getElementById('content');
  years.forEach(y => {
    const d = data[y];
    const sec = document.createElement('section');
    sec.className = 'year-section';
    sec.id = 'y'+y;
    const tagColor = stageColors[y];
    sec.innerHTML = '<div class="year-header">'+
      '<span class="year-tag" style="background:'+tagColor+'">'+stageNames[y]+'</span>'+
      '<h2>'+y+' <span style="font-size:14px;color:#7E8A93;font-weight:400;">'+ageRanges[y]+'</span></h2>'+
      '<p class="meta">'+yearlyProfiles[y]+'</p></div>'+
      '<div class="events-grid">'+
        d.events.map(e => '<div class="event-card">'+
          '<div class="month-badge">'+e.m+'</div>'+
          '<div>'+e.t+'</div>'+
          (e.loc ? '<div class="loc">'+e.loc+'</div>' : '')+
        '</div>').join('')+
      '</div>';
    c.appendChild(sec);
  });
}

function initScrollSpy(){
  const links = document.querySelectorAll('.sidebar a');
  const sections = document.querySelectorAll('.year-section');
  const headerH = 64;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        const y = e.target.id.replace('y','');
        links.forEach(l => l.classList.remove('active'));
        const link = document.querySelector('.sidebar a[href="#y'+y+'"]');
        if(link) link.classList.add('active');
      }
    });
  }, {rootMargin: '-'+(headerH+20)+'px 0px -60% 0px'});
  sections.forEach(s => observer.observe(s));
}

function buildDensityChart(){
  const ctx = document.getElementById('densityChart').getContext('2d');
  const counts = years.map(y => data[y].events.length);
  const bgColors = years.map(y => stageColors[y]);
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{
        data: counts,
        backgroundColor: bgColors.map(c => c+'99'),
        borderRadius: 4,
        barPercentage: 0.8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio:true,aspectRatio:3,
      plugins: {
        legend: {display: false},
        tooltip: {
          callbacks: {
            label: ctx => ctx.raw+' 条事件'
          }
        }
      },
      scales: {
        x: {ticks: {font: {size: 10}, color: '#7E8A93'}, grid: {display: false}},
        y: {display: false, beginAtZero: true}
      },
      onClick: (e,els) => {
        if(els.length){
          const idx = els[0].index;
          document.querySelector('#y'+years[idx]).scrollIntoView({behavior:'smooth'});
        }
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  buildContent();
  initScrollSpy();
  buildDensityChart();

  document.querySelectorAll('.sidebar a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = document.querySelector(a.getAttribute('href'));
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
});
})();
</script>
