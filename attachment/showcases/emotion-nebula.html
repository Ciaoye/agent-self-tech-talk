const earliest=Math.max(START,Math.min(...nodes.map(n=>n.time).filter(Number.isFinite)));
slider.min=0;slider.max=TOTAL_DAYS;slider.step=1;slider.value=Math.max(0,Math.round((earliest-START)/DAY));
function formatDate(ms){const d=new Date(ms);return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`}
function updateTime(){const day=Number(slider.value),selected=START+day*DAY+DAY-1;activeNodes=nodes.filter(n=>n.time<=selected);slider.style.setProperty('--progress',`${day/TOTAL_DAYS*100}%`);timeStatus.textContent=`${formatDate(START+day*DAY)}  ·  ${activeNodes.length.toLocaleString()} / ${nodes.length.toLocaleString()} 个情绪`;if(hovered&&!activeNodes.includes(hovered)){hovered=null;showTip(null)}}
slider.addEventListener('input',updateTime);updateTime();
function project(n){n.sx=W/2+(n.px-W/2)*camera.zoom+camera.panX;n.sy=H/2+(n.py-H/2)*camera.zoom+camera.panY}
function clampCamera(){camera.zoom=Math.max(1,Math.min(8,camera.zoom));const mx=(camera.zoom-1)*Math.max(W*.3,W/2-plot.l),my=(camera.zoom-1)*Math.max(H*.5,H/2-plot.b);camera.panX=Math.max(-mx,Math.min(mx,camera.panX));camera.panY=Math.max(-my,Math.min(my,camera.panY))}
function rgba(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`}
const spriteCache=new Map();
function glowSprite(n,isHot){
  const glow=13+n.r*5.4,key=n.colors.length>1?`mix_${n.id}_${isHot?1:0}`:`${n.colors[0]}_${Math.round(n.r*3)}_${isHot?1:0}`;
  if(spriteCache.has(key))return spriteCache.get(key);
  const size=Math.ceil(glow*2.9+8),c=document.createElement('canvas');c.width=c.height=size;const gctx=c.getContext('2d'),cx=size/2,cy=size/2;
  if(n.colors.length>1){const dx=Math.cos(n.blendAngle)*glow*.2,dy=Math.sin(n.blendAngle)*glow*.2;n.colors.slice(0,2).forEach((color,i)=>{const sign=i?1:-1,weight=i?n.mix:1-n.mix,g=gctx.createRadialGradient(cx+dx*sign,cy+dy*sign,0,cx+dx*sign,cy+dy*sign,glow*n.shape);g.addColorStop(0,rgba(color,(isHot?.84:.58)*(.72+weight*.5)));g.addColorStop(.32,rgba(color,(isHot?.30:.2)*(.72+weight*.5)));g.addColorStop(1,rgba(color,0));gctx.fillStyle=g;gctx.beginPath();gctx.arc(cx+dx*sign,cy+dy*sign,glow*n.shape,0,Math.PI*2);gctx.fill()})}
  else{const color=n.colors[0],g=gctx.createRadialGradient(cx,cy,0,cx,cy,glow);g.addColorStop(0,rgba(color,isHot?.88:.62));g.addColorStop(.34,rgba(color,isHot?.30:.19));g.addColorStop(1,rgba(color,0));gctx.fillStyle=g;gctx.beginPath();gctx.arc(cx,cy,glow,0,Math.PI*2);gctx.fill()}
  const sprite={c,size};spriteCache.set(key,sprite);return sprite;
}
function drawNode(n,isHot){
  const sprite=glowSprite(n,isHot),z=Math.min(camera.zoom,4),size=sprite.size*z;
  ctx.save();ctx.globalCompositeOperation='source-over';ctx.drawImage(sprite.c,n.sx-size/2,n.sy-size/2,size,size);ctx.restore();
  // crisp solid dot on top
  const dz=Math.min(camera.zoom,4),dr=(n.r*.3+1)*(.5+.8*n.shape);
  ctx.fillStyle=`rgba(255,255,255,${isHot?.85:.65})`;ctx.beginPath();ctx.arc(n.sx,n.sy,dr*dz,0,Math.PI*2);ctx.fill();
}
function drawLinks(){
  const cell=58,grid=new Map();
  activeNodes.forEach((n,i)=>{const k=`${Math.floor(n.sx/cell)},${Math.floor(n.sy/cell)}`;(grid.get(k)||grid.set(k,[]).get(k)).push(i)});
  ctx.save();ctx.lineWidth=.55;let count=0;
  for(let i=0;i<activeNodes.length&&count<1000;i+=2){const a=activeNodes[i],gx=Math.floor(a.sx/cell),gy=Math.floor(a.sy/cell);for(let ox=-1;ox<=1&&count<1000;ox++)for(let oy=-1;oy<=1&&count<1000;oy++){const bucket=grid.get(`${gx+ox},${gy+oy}`)||[];for(const j of bucket){if(j<=i||count>=1000)continue;const b=activeNodes[j],dx=a.sx-b.sx,dy=a.sy-b.sy,dd=dx*dx+dy*dy;if(dd<2304){const dist=Math.sqrt(dd);ctx.strokeStyle=`rgba(36,35,43,${(48-dist)/48*.02})`;ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();count++}}}}
  ctx.restore();
}
function drawCursor(){
  const now=performance.now();trail=trail.filter(p=>now-p.t<520);
  if(trail.length>1){ctx.save();ctx.lineCap='round';ctx.lineJoin='round';for(let i=1;i<trail.length;i++){const a=trail[i-1],b=trail[i],life=1-(now-b.t)/520;ctx.strokeStyle=`rgba(93,227,255,${Math.max(0,life)*.18})`;ctx.lineWidth=.6+life*2.2;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}ctx.restore()}
  if(!mouse.active)return;
  const radius=panning?28:22,g=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,radius);g.addColorStop(0,'rgba(255,216,74,.30)');g.addColorStop(.36,'rgba(93,227,255,.13)');g.addColorStop(1,'rgba(93,227,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(mouse.x,mouse.y,radius,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=panning?'rgba(36,35,43,.72)':'rgba(36,35,43,.48)';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(mouse.x,mouse.y,panning?7:5,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(36,35,43,.64)';ctx.beginPath();ctx.arc(mouse.x,mouse.y,1.2,0,Math.PI*2);ctx.fill();
}
function moveNodes(now){
  const t=now*.001;
  activeNodes.forEach((n,i)=>{
    if(n===dragged)return;
    // smooth transition when tx/ty is set
    if(n.tx!=null){n.px+=(n.tx-n.px)*.06;n.py+=(n.ty-n.py)*.06;if(Math.abs(n.px-n.tx)+Math.abs(n.py-n.ty)<.5){n.px=n.tx;n.py=n.ty;n.tx=null;n.ty=null}}
    n.vx+=Math.sin(t*n.freq1+n.phase1)*.0025+Math.sin(t*.27+n.homeY*.009)*.001;
    n.vy+=Math.cos(t*n.freq2+n.phase2)*.0025+Math.cos(t*.23+n.homeX*.008)*.001;
    n.vx*=.95;n.vy*=.95;n.px+=n.vx;n.py+=n.vy;
    n.px=Math.max(plot.l+n.r,Math.min(W-plot.r-n.r,n.px));n.py=Math.max(plot.t+n.r,Math.min(H-plot.b-n.r,n.py));
  })
}
function nearest(x,y){let best=null,bd=20*20;for(const n of activeNodes){const dx=n.sx-x,dy=n.sy-y,d=dx*dx+dy*dy,hit=Math.max(12,n.r*Math.min(camera.zoom,4)+6);if(d<Math.min(bd,hit*hit)){best=n;bd=d}}return best}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function showTip(n){if(!n){tip.style.display='none';return}tip.innerHTML=`<div class="emotion">${esc(n.emotion)}</div><div class="meta">${esc(n.date)} · ${esc(n.age)} 岁</div><div class="desc">${esc(n.description)}</div>`;tip.style.display='block';const pad=18,tw=Math.min(340,tip.offsetWidth),th=tip.offsetHeight;let x=mouse.x+18,y=mouse.y+16;if(x+tw>W-pad)x=mouse.x-tw-18;if(y+th>H-pad)y=mouse.y-th-16;tip.style.left=`${Math.max(pad,x)}px`;tip.style.top=`${Math.max(pad,y)}px`}
canvas.addEventListener('pointermove',e=>{const r=canvas.getBoundingClientRect(),now=performance.now();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;mouse.active=true;if(!trail.length||Math.hypot(mouse.x-trail[trail.length-1].x,mouse.y-trail[trail.length-1].y)>2)trail.push({x:mouse.x,y:mouse.y,t:now});if(trail.length>24)trail.shift();if(dragged){const wx=W/2+(mouse.x-W/2-camera.panX)/camera.zoom,wy=H/2+(mouse.y-H/2-camera.panY)/camera.zoom;dragged.px=Math.max(plot.l,Math.min(W-plot.r,wx));dragged.py=Math.max(plot.t,Math.min(H-plot.b,wy));project(dragged);hovered=dragged}else if(panning){camera.panX=panOrigin.panX+mouse.x-panOrigin.x;camera.panY=panOrigin.panY+mouse.y-panOrigin.y;clampCamera();hovered=null}else hovered=nearest(mouse.x,mouse.y);showTip(hovered)});
canvas.addEventListener('pointerdown',e=>{mouse.active=true;dragged=nearest(e.clientX,e.clientY);if(!dragged){panning=true;panOrigin={x:e.clientX,y:e.clientY,panX:camera.panX,panY:camera.panY}}canvas.setPointerCapture(e.pointerId)});
canvas.addEventListener('pointerup',e=>{if(dragged){dragged.homeX=dragged.px;dragged.homeY=dragged.py;dragged.vx=0;dragged.vy=0}dragged=null;panning=false;panOrigin=null;try{canvas.releasePointerCapture(e.pointerId)}catch{}});
canvas.addEventListener('pointerenter',()=>{mouse.active=true});
canvas.addEventListener('pointerleave',()=>{if(!dragged&&!panning){mouse.active=false;hovered=null;showTip(null)}});
canvas.addEventListener('wheel',e=>{e.preventDefault();mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true;const old=camera.zoom,next=Math.max(1,Math.min(8,old*Math.exp(-e.deltaY*.0012))),ratio=next/old;camera.panX=mouse.x-W/2-ratio*(mouse.x-W/2-camera.panX);camera.panY=mouse.y-H/2-ratio*(mouse.y-H/2-camera.panY);camera.zoom=next;clampCamera();hint.textContent=`空白处拖动画面 · 拖拽点 · 缩放 ${Math.round(camera.zoom*100)}%`},{passive:false});
function frame(now){ctx.fillStyle='#f7f6f3';ctx.fillRect(0,0,W,H);activeNodes.forEach(project);drawLinks();activeNodes.forEach(n=>{if(n!==hovered)drawNode(n,false)});if(hovered)drawNode(hovered,true);moveNodes(now);drawCursor();requestAnimationFrame(frame)}
requestAnimationFrame(frame);
</script>
</body>
