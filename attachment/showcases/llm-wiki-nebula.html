/* ---- force-directed layout ---- */
function initLayout(){
  nodes.forEach(n=>{
    const ang=Math.random()*Math.PI*2;
    const rad=Math.sqrt(Math.random())*560+30;
    n.x=Math.cos(ang)*rad+(Math.random()-.5)*50;
    n.y=Math.sin(ang)*rad+(Math.random()-.5)*50;
  });
  const byCat={};
  nodes.forEach(n=>{(byCat[n.category]=byCat[n.category]||[]).push(n);});
  const ITER=620,decay=0.993;
  let a=1;
  for(let it=0;it<ITER;it++){
    for(let i=0;i<nodes.length;i++){
      const ni=nodes[i];
      for(let j=i+1;j<nodes.length;j++){
        const nj=nodes[j];
        let dx=nj.x-ni.x,dy=nj.y-ni.y;let d2=dx*dx+dy*dy;
        if(d2<1){d2=1;dx=Math.random()-.5;dy=Math.random()-.5;}
        const d=Math.sqrt(d2),f=2600*a/d2,fx=dx/d*f,fy=dy/d*f;  // 斥力减小→更分散
        ni.vx-=fx;ni.vy-=fy;nj.vx+=fx;nj.vy+=fy;
      }
    }
    EDGES.forEach(([na,nb])=>{
      const A=nodeMap.get(na),B=nodeMap.get(nb);if(!A||!B)return;
      let dx=B.x-A.x,dy=B.y-A.y;const d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=(d-120)*0.005*a;                                // 理想边长增大
      A.vx+=dx/d*f;A.vy+=dy/d*f;B.vx-=dx/d*f;B.vy-=dy/d*f;
    });
    Object.values(byCat).forEach(list=>{
      for(let i=0;i<list.length;i++){
        for(let j=i+1;j<list.length;j++){
          const A=list[i],B=list[j];
          let dx=B.x-A.x,dy=B.y-A.y;const dd=Math.sqrt(dx*dx+dy*dy);
          if(dd<100||dd>360)continue;
          const f=(dd-200)*0.0018*a;
          A.vx+=dx/dd*f;A.vy+=dy/dd*f;B.vx-=dx/dd*f;B.vy-=dy/dd*f;
        }
      }
    });
    nodes.forEach(n=>{n.vx+=(0-n.x)*0.0006*a;n.vy+=(0-n.y)*0.0006*a;});
    nodes.forEach(n=>{n.x+=n.vx*0.6;n.y+=n.vy*0.6;n.vx*=0.82;n.vy*=0.82;});
    a*=decay;
  }
  let maxR=0;nodes.forEach(n=>{const r=Math.hypot(n.x,n.y);if(r>maxR)maxR=r;});
  if(maxR>1){const k=720/maxR;nodes.forEach(n=>{n.x*=k;n.y*=k;});}   // 归一化半径增大→铺满
  nodes.forEach(n=>{n.fx=n.x;n.fy=n.y;});
}
initLayout();

}

/* ---- camera 边界限制：防止图被拖出/缩放出屏幕 ---- */
const WORLD_R=780; // 节点世界半径（与布局归一化匹配）
function clampCamera(){
  const z=camera.zoom;
  // 世界尺寸（屏幕像素）
  const halfW=W/2,halfH=H/2;
  // 允许的 pan 范围：让世界中心不离开屏幕太多
  const maxPanX=Math.max(0,(WORLD_R*z-halfW)/z+40);
  const maxPanY=Math.max(0,(WORLD_R*z-halfH)/z+40);
  if(camera.panX> maxPanX)camera.panX= maxPanX;
  if(camera.panX<-maxPanX)camera.panX=-maxPanX;
  if(camera.panY> maxPanY)camera.panY= maxPanY;
  if(camera.panY<-maxPanY)camera.panY=-maxPanY;
}

/* ---- interaction ---- */
function nearest(x,y){
  let best=null,bd=12*12;
  for(const n of nodes){
    const dx=n.sx-x,dy=n.sy-y,d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=n;}
  }
  return best;
}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function showTip(n,e){
  if(!n){tip.style.display="none";return;}
  tip.innerHTML=`<div class="t-name">${esc(n.name)}</div>
    <span class="t-cat" style="border-color:${n.color}55;color:${n.color}">${n.category}</span>
    <div class="t-desc">${n.desc?esc(n.desc):'<span style="opacity:.35">暂无简介</span>'}</div>`;
  tip.style.display="block";
  let tx=e.clientX+16,ty=e.clientY+16;
  const r=tip.getBoundingClientRect();
  if(tx+r.width>W-10)tx=e.clientX-r.width-16;
  if(ty+r.height>H-10)ty=e.clientY-r.height-16;
  tip.style.left=tx+"px";tip.style.top=ty+"px";
}
canvas.addEventListener("pointermove",e=>{
  const cr=canvas.getBoundingClientRect(),mx=e.clientX-cr.left,my=e.clientY-cr.top;
  if(panning){camera.panX=panOrigin.panX+(mx-panOrigin.x)/camera.zoom;
    camera.panY=panOrigin.panY+(my-panOrigin.y)/camera.zoom;clampCamera();hovered=null;}
  else hovered=nearest(mx,my);
  showTip(hovered,e);
  canvas.style.cursor=hovered?"pointer":(panning?"grabbing":"grab");
});
canvas.addEventListener("pointerdown",e=>{
  const cr=canvas.getBoundingClientRect(),mx=e.clientX-cr.left,my=e.clientY-cr.top;
  hovered=nearest(mx,my);
  if(!hovered){panning=true;panOrigin={x:mx,y:my,panX:camera.panX,panY:camera.panY};}
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointerup",e=>{panning=false;panOrigin=null;
  try{canvas.releasePointerCapture(e.pointerId)}catch{}});
canvas.addEventListener("pointerleave",()=>{if(!panning){hovered=null;showTip(null);}});
canvas.addEventListener("wheel",e=>{
  e.preventDefault();const mx=e.clientX,my=e.clientY;
  const old=camera.zoom,next=Math.max(.3,Math.min(7,old*Math.exp(-e.deltaY*.0015)));
  const wx=(mx-W/2)/old+camera.panX,wy=(my-H/2)/old+camera.panY;
  camera.zoom=next;camera.panX=wx-(mx-W/2)/next;camera.panY=wy-(my-H/2)/next;clampCamera();
},{passive:false});
let searchTerm="";
search.addEventListener("input",()=>{searchTerm=search.value.trim().toLowerCase();});

/* ---- hex→rgb ---- */
function hexRGB(hex){const n=parseInt(hex.slice(1),16);return [n>>16&255,n>>8&255,n&255];}

/* ═══════════ RENDER LOOP ═══════════ */
let t0=performance.now(),globT=0,last=t0;
function frame(now){
  globT=(now-t0)/1000;
  const dt=Math.min(0.05,(now-last)/1000);last=now;

  // 清屏，无残影
  ctx.fillStyle="#f7f6f3";
  ctx.fillRect(0,0,W,H);

  /* 节点漂移：全局流场（整体流动感）+ 轻微随机 + 锚点回拉 */
  nodes.forEach(n=>{
    n.driftTimer+=dt;
    if(n.driftTimer>n.driftNext){
      const ang=Math.random()*Math.PI*2,spd=0.2+Math.random()*0.4;
      n.dvx=Math.cos(ang)*spd;n.dvy=Math.sin(ang)*spd;
      n.driftTimer=0;n.driftNext=6+Math.random()*8;
    }
    // 全局流场：基于位置的低频 sin/cos 场，所有节点共享 → 整体漩涡流动
    const fx=Math.sin(n.y*0.006+globT*0.12)+Math.cos(n.x*0.004+globT*0.08)*0.6;
    const fy=Math.cos(n.x*0.006+globT*0.10)+Math.sin(n.y*0.004+globT*0.09)*0.6;
    const flowStr=2.2;
    n.vx+=(n.dvx-n.vx)*0.08;
    n.vy+=(n.dvy-n.vy)*0.08;
    n.vx+=fx*flowStr*dt;
    n.vy+=fy*flowStr*dt;
    n.vx+=(n.fx-n.x)*0.022;   // 更弱的锚点拉力，让流动更显著
    n.vy+=(n.fy-n.y)*0.022;
    n.x+=n.vx*dt;n.y+=n.vy*dt;
    const b=800;
    if(n.x>b){n.x=b;n.dvx=-Math.abs(n.dvx);}if(n.x<-b){n.x=-b;n.dvx=Math.abs(n.dvx);}
    if(n.y>b){n.y=b;n.dvy=-Math.abs(n.dvy);}if(n.y<-b){n.y=-b;n.dvy=Math.abs(n.dvy);}
    project(n);
  });

  drawAllEdges();
  drawNodes();

  requestAnimationFrame(frame);
}

/* ═══ 所有边：曲线扇形辐射，按类别批量绘制 ═══ */
function drawAllEdges(){
  ctx.save();
  ctx.globalCompositeOperation="source-over";   // 普通混合，性能好
  ctx.lineWidth=1.2*camera.zoom;
  const hoverName=hovered?hovered.name:null;

  for(const cat of BUCKET_CATS){
    const list=edgeBuckets[cat];
    const [r,g,b]=hexRGB(catColor(cat));
    // 基础半透明，无残影所以需更高 alpha；悬停时其他边保持不变
    const baseA=0.12;
    ctx.strokeStyle=`rgba(${r},${g},${b},${baseA})`;
    ctx.beginPath();
    for(const [aName,bName] of list){
      const A=nodeMap.get(aName),B=nodeMap.get(bName);
      const ax=A.sx,ay=A.sy,bx=B.sx,by=B.sy;
      const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy)||1;
      const px=-dy/len,py=dx/len;
      const breathe=0.85+0.15*Math.sin(globT*0.5+A.fanPhase);
      const curl=len*0.15*A.fanHand*breathe;
      const mx=(ax+bx)*0.5+px*curl,my=(ay+by)*0.5+py*curl;
      ctx.moveTo(ax,ay);
      ctx.quadraticCurveTo(mx,my,bx,by);
    }
    ctx.stroke();
  }

  /* 悬停高亮：直接连接边变深变粗 */
  if(hoverName){
    const col=hovered.color,[r,g,b]=hexRGB(col);
    ctx.strokeStyle=`rgba(${r},${g},${b},0.95)`;
    ctx.lineWidth=1.2*camera.zoom;
    ctx.beginPath();
    const A=hovered;
    for(const nb of adj.get(hoverName)||[]){
      const B=nodeMap.get(nb);if(!B)continue;
      const ax=A.sx,ay=A.sy,bx=B.sx,by=B.sy;
      const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy)||1;
      const px=-dy/len,py=dx/len;
      const curl=len*0.15*A.fanHand;
      const mx=(ax+bx)*0.5+px*curl,my=(ay+by)*0.5+py*curl;
      ctx.moveTo(ax,ay);ctx.quadraticCurveTo(mx,my,bx,by);
    }
    ctx.stroke();
  }
  ctx.restore();
}
function catColor(c){return CAT_COLOR[c]||"#9966ff"}

/* ═══ 节点：极小点 + 淡色光晕（白底适配） ═══ */
function drawNodes(){
  ctx.save();
  for(const n of nodes){
    const twk=0.68+0.32*Math.sin(globT*n.freq+n.twk);
    const isHover=(n===hovered);
    const [r,g,b]=hexRGB(n.color);
    // 淡色光晕：普通半透明，半径随缩放
    const zr=n.r*camera.zoom;
    const gr=isHover?zr*5:zr*2.8;
    const gctx=ctx.createRadialGradient(n.sx,n.sy,0,n.sx,n.sy,gr);
    gctx.addColorStop(0,`rgba(${r},${g},${b},${isHover?0.6:0.3*twk})`);
    gctx.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=gctx;
    ctx.beginPath();ctx.arc(n.sx,n.sy,gr,0,Math.PI*2);ctx.fill();
    // 核心点：类别色，悬停加深，半径随缩放
    ctx.fillStyle=isHover?n.color:`rgba(${r},${g},${b},${0.85*twk})`;
    ctx.beginPath();ctx.arc(n.sx,n.sy,(isHover?zr*1.6:zr),0,Math.PI*2);ctx.fill();

    // 搜索标记
    if(searchTerm&&n.name.toLowerCase().includes(searchTerm)){
      ctx.strokeStyle="rgba(220,60,60,.9)";ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(n.sx,n.sy,n.r*camera.zoom*3.5,0,Math.PI*2);ctx.stroke();
    }
    // 标签：简单黑字，基础半透明，悬停/搜索时变深
    const matchSearch=searchTerm&&n.name.toLowerCase().includes(searchTerm);
    const showLabel=isHover||matchSearch||(camera.zoom>1.6&&n.deg>4)||camera.zoom>2.2;
    if(showLabel){
      ctx.save();
      const fs=Math.min(11,8+camera.zoom*0.8);
      ctx.font=`400 ${fs}px 'Noto Sans SC',sans-serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle=isHover?"#000":"rgba(30,30,40,0.45)";
      ctx.fillText(n.name,n.sx,n.sy-fs*0.9);
      ctx.restore();
    }
  }
  ctx.restore();
}

requestAnimationFrame(frame);
</script>
