<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768">
  <defs>
    <marker id="arrow-ctr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#74736c"/>
    </marker>
  </defs>

  <rect width="1024" height="768" fill="transparent"/>

  <!-- ===== 中心节点 ===== -->
  <rect x="382" y="342" width="260" height="84" rx="14" fill="#f1efe7" stroke="#d5d1c7" stroke-width="2.5"/>
  <text x="512" y="378" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#18343a">Agent 时代的</text>
  <text x="512" y="404" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#18343a">自我技术</text>

  <!-- ===== 连接箭头（中心到四个辐条） ===== -->
  <!-- 中心 → 上方 -->
  <line x1="512" y1="342" x2="512" y2="230" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-ctr)"/>
  <!-- 中心 → 右方 -->
  <line x1="642" y1="384" x2="720" y2="384" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-ctr)"/>
  <!-- 中心 → 下方 -->
  <line x1="512" y1="426" x2="512" y2="530" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-ctr)"/>
  <!-- 中心 → 左方 -->
  <line x1="382" y1="384" x2="304" y2="384" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-ctr)"/>

  <!-- ===== 辐条 1（上方）：创作 ===== -->
  <rect x="382" y="105" width="260" height="88" rx="12" fill="#ddf7ef" stroke="#10a98c" stroke-width="2"/>
  <text x="512" y="142" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#006b61">创作</text>
  <text x="512" y="170" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="14" fill="#006b61">智慧 × 形式</text>

  <!-- ===== 辐条 2（右方）：数字分身 ===== -->
  <rect x="726" y="345" width="260" height="78" rx="12" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="2"/>
  <text x="856" y="378" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#4b2e83">数字分身</text>
  <text x="856" y="404" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="14" fill="#4b2e83">完整自我映射</text>

  <!-- ===== 辐条 3（下方）：书写与知识库 ===== -->
  <rect x="382" y="536" width="260" height="88" rx="12" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="2"/>
  <text x="512" y="573" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#1b4d7a">书写与知识库</text>
  <text x="512" y="601" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="14" fill="#1b4d7a">对应经验档案库</text>

  <!-- ===== 辐条 4（左方）：数字内观 ===== -->
  <rect x="38" y="345" width="260" height="78" rx="12" fill="#fff1d9" stroke="#f1a23a" stroke-width="2"/>
  <text x="168" y="378" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#7a3f00">数字内观</text>
  <text x="168" y="404" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="14" fill="#7a3f00">对应三观 / 去标签</text>

  <!-- ===== 底部图例 ===== -->
  <rect x="160" y="668" width="704" height="54" rx="8" fill="#f8f7f4" stroke="none"/>
  <!-- 图例1: 创作 -->
  <rect x="185" y="685" width="14" height="14" rx="3" fill="#ddf7ef" stroke="#10a98c" stroke-width="1"/>
  <text x="205" y="697" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4a4a4a">创作层（智慧×形式）</text>
  <!-- 图例2: 数字分身 -->
  <rect x="349" y="685" width="14" height="14" rx="3" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1"/>
  <text x="369" y="697" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4a4a4a">数字分身（自我映射）</text>
  <!-- 图例3: 书写与知识库 -->
  <rect x="523" y="685" width="14" height="14" rx="3" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1"/>
  <text x="543" y="697" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4a4a4a">书写与知识库（经验档案）</text>
  <!-- 图例4: 数字内观 -->
  <rect x="715" y="685" width="14" height="14" rx="3" fill="#fff1d9" stroke="#f1a23a" stroke-width="1"/>
  <text x="735" y="697" font-family="system-ui, PingFang SC, sans-serif" font-size="12" fill="#4a4a4a">数字内观（去标签）</text>
</svg>