<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" role="img" aria-labelledby="title">
  <title id="title">俏也 OS 系统架构 — 浏览器桌面操作系统</title>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .layer-title { font-size: 18px; font-weight: 700; }
      .app-name { font-size: 12px; fill: #18343a; text-anchor: middle; font-weight: 600; }
      .app-emoji { font-size: 22px; text-anchor: middle; }
      .widget-name { font-size: 11px; fill: #596362; text-anchor: middle; }
      .tech-label { font-size: 13px; fill: #18343a; font-weight: 600; text-anchor: middle; }
      .tech-desc { font-size: 12px; fill: #596362; }
      .callout { font-size: 13px; fill: #3f4e4c; }
      .url-text { font-size: 11.5px; fill: #596362; font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .layer-desc { font-size: 13px; fill: #3f4e4c; }
      .num { font-size: 14px; font-weight: 760; }
      .neutral { fill: #f1efe7; stroke: #d5d1c7; stroke-width: 1.5; }
      .green { fill: #ddf7ef; stroke: #10a98c; stroke-width: 1.5; }
      .blue { fill: #e6f2ff; stroke: #4f8fd6; stroke-width: 1.5; }
      .purple { fill: #f0e8ff; stroke: #8b6fd6; stroke-width: 1.5; }
      .yellow { fill: #fff1d9; stroke: #f1a23a; stroke-width: 1.5; }
      .green-text { fill: #006b61; }
      .blue-text { fill: #1b4d7a; }
      .purple-text { fill: #4b2e83; }
      .yellow-text { fill: #7a3f00; }
      .app-card { fill: #fff; stroke: #d5d1c7; stroke-width: 1; rx: 6; }
      .app-card-blue { fill: #fff; stroke: #4f8fd6; stroke-width: 1; rx: 6; }
      .app-card-green { fill: #fff; stroke: #10a98c; stroke-width: 1; rx: 6; }
      .win95-titlebar { fill: #000080; rx: 0; }
      .win95-bar { fill: #c0c0c0; rx: 0; }
    </style>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#74736c"/>
    </marker>
    <marker id="arrow-up" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 6, 8 3, 0 0" fill="#74736c"/>
    </marker>
  </defs>

  <!-- ===== TITLE BAR ===== -->
  <rect x="160" y="20" width="704" height="52" rx="8" class="green"/>
  <text x="512" y="40" text-anchor="middle" class="layer-title green-text">俏也 OS</text>
  <text x="512" y="60" text-anchor="middle" style="font-size:14px;fill:#006b61;">Win95 风格 · 浏览器桌面操作系统 · 纯静态零框架</text>

  <!-- ===== DESKTOP AREA (top layer) ===== -->
  <rect x="48" y="90" width="928" height="210" rx="10" class="blue"/>
  <text x="68" y="116" class="layer-title blue-text">桌面应用层</text>
  <text x="190" y="116" style="font-size:12px;fill:#1b4d7a;">9 个桌面应用 · 可拖拽窗口 · 多窗口 z-index 管理</text>

  <!-- Row 1: 6 main apps -->
  <!-- Chat -->
  <rect x="68" y="134" width="132" height="60" rx="6" class="app-card-blue"/>
  <text x="134" y="154" class="app-emoji">💬</text>
  <text x="134" y="174" class="app-name blue-text">Chat</text>
  <text x="134" y="186" style="font-size:10px;fill:#596362;text-anchor:middle;">SSE 流式对话</text>

  <!-- Letter -->
  <rect x="214" y="134" width="132" height="60" rx="6" class="app-card-green"/>
  <text x="280" y="154" class="app-emoji">✉️</text>
  <text x="280" y="174" class="app-name green-text">Letter</text>
  <text x="280" y="186" style="font-size:10px;fill:#596362;text-anchor:middle;">AI 笔友·长信</text>

  <!-- Lifelog -->
  <rect x="360" y="134" width="132" height="60" rx="6" class="app-card"/>
  <text x="426" y="154" class="app-emoji">📅</text>
  <text x="426" y="174" class="app-name">Lifelog</text>
  <text x="426" y="186" style="font-size:10px;fill:#596362;text-anchor:middle;">时间轴·情绪地图</text>

  <!-- Wikipedia -->
  <rect x="506" y="134" width="132" height="60" rx="6" class="app-card"/>
  <text x="572" y="154" class="app-emoji">📚</text>
  <text x="572" y="174" class="app-name">Wikipedia</text>
  <text x="572" y="186" style="font-size:10px;fill:#596362;text-anchor:middle;">184 篇知识星云</text>

  <!-- Paint -->
  <rect x="652" y="134" width="132" height="60" rx="6" class="app-card"/>
  <text x="718" y="154" class="app-emoji">🎨</text>
  <text x="718" y="174" class="app-name">Paint</text>
  <text x="718" y="186" style="font-size:10px;fill:#596362;text-anchor:middle;">像素画板·触屏</text>

  <!-- Files -->
  <rect x="798" y="134" width="132" height="60" rx="6" class="app-card"/>
  <text x="864" y="154" class="app-emoji">📁</text>
  <text x="864" y="174" class="app-name">Files</text>
  <text x="864" y="186" style="font-size:10px;fill:#596362;text-anchor:middle;">IndexedDB 文件</text>

  <!-- Row 2: 3 apps + widgets -->
  <!-- Notepad -->
  <rect x="168" y="208" width="110" height="56" rx="6" class="app-card"/>
  <text x="223" y="228" class="app-emoji">📝</text>
  <text x="223" y="248" class="app-name">Notepad</text>
  <text x="223" y="258" style="font-size:10px;fill:#596362;text-anchor:middle;">纯文本记事本</text>

  <!-- 2048 -->
  <rect x="292" y="208" width="110" height="56" rx="6" class="app-card"/>
  <text x="347" y="228" class="app-emoji">🔢</text>
  <text x="347" y="248" class="app-name">2048</text>
  <text x="347" y="258" style="font-size:10px;fill:#596362;text-anchor:middle;">经典数字游戏</text>

  <!-- Sweeper -->
  <rect x="416" y="208" width="110" height="56" rx="6" class="app-card"/>
  <text x="471" y="228" class="app-emoji">💣</text>
  <text x="471" y="248" class="app-name">Sweeper</text>
  <text x="471" y="258" style="font-size:10px;fill:#596362;text-anchor:middle;">扫雷·三种难度</text>

  <!-- Divider for widgets -->
  <line x1="552" y1="214" x2="552" y2="258" stroke="#d5d1c7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Widgets -->
  <text x="600" y="228" style="font-size:12px;fill:#596362;font-weight:600;">桌面小部件</text>

  <rect x="580" y="236" width="88" height="36" rx="5" class="app-card"/>
  <text x="624" y="248" style="font-size:16px;text-anchor:middle;">📻</text>
  <text x="624" y="264" class="widget-name">Lo-fi Radio</text>

  <rect x="678" y="236" width="88" height="36" rx="5" class="app-card"/>
  <text x="722" y="248" style="font-size:16px;text-anchor:middle;">📋</text>
  <text x="722" y="264" class="widget-name">便利贴</text>

  <rect x="776" y="236" width="88" height="36" rx="5" class="app-card"/>
  <text x="820" y="248" style="font-size:16px;text-anchor:middle;">🕐</text>
  <text x="820" y="264" class="widget-name">桌面时钟</text>

  <!-- Arrow down to engine -->
  <line x1="512" y1="300" x2="512" y2="320" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-down)"/>

  <!-- ===== CORE ENGINE (middle layer) ===== -->
  <rect x="48" y="326" width="928" height="120" rx="10" class="neutral"/>
  <text x="68" y="352" class="layer-title">核心引擎</text>
  <text x="160" y="352" style="font-size:12px;fill:#596362;">纯静态 · 零框架 · HTML + CSS + Vanilla JS</text>

  <!-- Engine components -->
  <rect x="68" y="370" width="196" height="56" rx="6" class="app-card"/>
  <text x="166" y="396" class="tech-label">windowManager.js</text>
  <text x="166" y="414" style="font-size:11px;fill:#596362;text-anchor:middle;">多窗口管理 · z-index 堆叠</text>

  <rect x="280" y="370" width="196" height="56" rx="6" class="app-card"/>
  <text x="378" y="396" class="tech-label">桌面渲染引擎</text>
  <text x="378" y="414" style="font-size:11px;fill:#596362;text-anchor:middle;">图标绘制 · 任务栏 · 开始菜单</text>

  <rect x="492" y="370" width="196" height="56" rx="6" class="app-card"/>
  <text x="590" y="396" class="tech-label">IndexedDB 存储</text>
  <text x="590" y="414" style="font-size:11px;fill:#596362;text-anchor:middle;">文件系统 · 画作 · 聊天记录</text>

  <rect x="704" y="370" width="196" height="56" rx="6" class="app-card"/>
  <text x="802" y="396" class="tech-label">Web API 能力</text>
  <text x="802" y="414" style="font-size:11px;fill:#596362;text-anchor:middle;">localStorage · 音效 · 触屏</text>

  <!-- Arrow down to data -->
  <line x1="512" y1="446" x2="512" y2="466" stroke="#74736c" stroke-width="2" marker-end="url(#arrow-down)"/>

  <!-- ===== DATA LAYER (bottom) ===== -->
  <rect x="48" y="472" width="928" height="82" rx="10" class="purple"/>
  <text x="68" y="498" class="layer-title purple-text">数据底座</text>
  <text x="160" y="498" style="font-size:12px;fill:#4b2e83;">从 LLM wiki 脱敏 · 纯静态 Markdown → HTML</text>

  <text x="68" y="524" style="font-size:13px;fill:#4b2e83;font-weight:600;">wiki-public/</text>
  <text x="170" y="524" class="layer-desc">184 篇 Markdown 双链笔记 · 交互式知识星云 HTML</text>
  <text x="68" y="544" style="font-size:13px;fill:#4b2e83;font-weight:600;">Lifelog 数据</text>
  <text x="170" y="544" class="layer-desc">脱敏年度档案 · 时间轴 · 情绪地图</text>

  <!-- ===== SIDE ANNOTATIONS ===== -->

  <!-- Left: Tech highlight -->
  <rect x="48" y="568" width="296" height="84" rx="8" class="yellow"/>
  <text x="68" y="592" class="layer-title yellow-text">技术特色</text>
  <text x="68" y="616" class="callout">· Tailwind CDN + Font Awesome CDN</text>
  <text x="68" y="636" class="callout">· 移动端 matchMedia 响应式适配</text>

  <!-- Center: Deployment -->
  <rect x="360" y="568" width="304" height="84" rx="8" class="green"/>
  <text x="380" y="592" class="layer-title green-text">发布方式</text>
  <text x="380" y="616" class="callout">· GitHub Pages 静态托管</text>
  <text x="380" y="636" class="callout">· 无需服务器 · 无需构建</text>

  <!-- Right: Experience -->
  <rect x="680" y="568" width="296" height="84" rx="8" class="blue"/>
  <text x="700" y="592" class="layer-title blue-text">使用体验</text>
  <text x="700" y="616" class="callout">· Win95 像素风 UI，怀旧 + 现代</text>
  <text x="700" y="636" class="callout">· 拖拽窗口，和真桌面一样</text>

  <!-- URL -->
  <rect x="48" y="666" width="928" height="34" rx="6" class="neutral" stroke-dasharray="4,3"/>
  <text x="512" y="688" text-anchor="middle" class="url-text">访问地址：https://ciaoye.github.io/</text>

  <!-- Bottom connectors showing data flow -->
  <line x1="196" y1="554" x2="196" y2="568" stroke="#d5d1c7" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="512" y1="554" x2="512" y2="568" stroke="#d5d1c7" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="828" y1="554" x2="828" y2="568" stroke="#d5d1c7" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
